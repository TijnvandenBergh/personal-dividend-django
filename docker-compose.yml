services:
  web:
    build: .
    image: personal-dividend-app:latest
    container_name: personal-dividend-app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      SECRET_KEY: "${SECRET_KEY:-dev-secret-change-me}"
      ALLOWED_HOSTS: "localhost 127.0.0.1 0.0.0.0 web"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000 http://127.0.0.1:8000 http://0.0.0.0:8000"
      DB_FILE: "/data/app.db"
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
