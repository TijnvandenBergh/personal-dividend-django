{% load i18n %}
<form method="post" action="{% url 'accounts:set_theme' %}" class="theme-toggle-form">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}" />
  <input type="hidden" name="theme" value="{% if theme == 'dark' %}light{% else %}dark{% endif %}" />
  <button type="submit" class="theme-toggle" aria-label="{% trans 'Toggle theme' %}" title="{% trans 'Toggle theme' %}">
    {% if theme == 'dark' %}
      <svg viewBox="0 0 24 24" aria-hidden="true" class="icon">
        <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    {% else %}
      <svg viewBox="0 0 24 24" aria-hidden="true" class="icon">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </svg>
    {% endif %}
  </button>
</form>
